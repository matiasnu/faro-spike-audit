services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: faro-spike-audit:dev
    container_name: faro-spike-worker
    ports:
      - "8000:8000"
    # The .env file is OPTIONAL. When present, its values override the defaults
    # baked into the Dockerfile (ENV ENABLE_AI_REMEDIATION=false, LOG_LEVEL=INFO,
    # etc.). Do NOT define an `environment:` block here — explicit `environment`
    # values in compose take precedence over `env_file`, which silently breaks
    # `ENABLE_AI_REMEDIATION=true` in the user's .env.
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
